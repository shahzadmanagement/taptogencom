name: Release Quality & CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint --if-present

    - name: Run TypeScript Check
      run: npm run typecheck --if-present

    - name: Build Platform
      run: npm run build

    - name: Run Unit Tests (Vitest)
      run: npm run test:unit --if-present

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Generate Sitemap and Robots
      run: |
        node scripts/generate-sitemap.js
        node scripts/generate-robots.js

    - name: Validate Bundle Performance Budget
      run: |
        echo "Analyzing built bundle sizes..."
        ls -lh dist/ || true
        # Budget check: main chunks must be under 350KB
        SIZE=$(du -sk dist/ | cut -f1)
        echo "Total Bundle Size: ${SIZE}KB"
        if [ "$SIZE" -gt 350000 ]; then
          echo "Error: Bundle exceeds the maximum performance budget limit!"
          exit 1
        fi

    - name: Validate Analytics and Telemetry configurations
      run: |
        node scripts/check-analytics.js
        node scripts/check-telemetry.js
        node scripts/generate-platform-report.js

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-assets
        path: dist/
