name: Production Validation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, Verify and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js 22 (LTS)
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Display Environment Info
      run: |
        echo "=== Environment Diagnostics ==="
        echo "Node Version: $(node -v)"
        echo "NPM Version:  $(npm -v)"
        echo "OS Platform:  $(uname -a)"
        echo "==============================="

    - name: Install Dependencies
      run: npm ci

    - name: Run ESLint Checks
      run: npm run lint --if-present

    - name: Run TypeScript Verification
      run: npm run typecheck

    - name: Verify Codebase Import Integrity
      run: node scratch/check-imports.js

    - name: Verify Generator Structures & Outlines
      run: node scratch/check-all-generators.js

    - name: Run Generator Regression Tests
      run: node scratch/regression-test.js

    - name: Build Platform Static Files
      run: npm run build

    - name: Generate Sitemap and Robots
      run: |
        node scripts/generate-sitemap.js
        node scripts/generate-robots.js

    - name: Validate Bundle Performance Budget
      run: |
        echo "Analyzing built bundle sizes..."
        ls -lh dist/ || true
        SIZE=$(du -sk dist/ | cut -f1)
        echo "Total Bundle Size: ${SIZE}KB"
        if [ "$SIZE" -gt 350000 ]; then
          echo "Error: Bundle exceeds the maximum performance budget limit!"
          exit 1
        fi

    - name: Run Production Build Verification
      run: node scripts/verify-production.js

    - name: Run Production SEO Audit
      run: npm run seo:audit

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run E2E Browser Validation Tests
      run: npm run test:e2e

    - name: Upload Regression Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: generator-regression-reports
        path: |
          reports/regression-report.json
          reports/regression-report.md

    - name: Upload SEO Audit Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: generator-seo-reports
        path: |
          reports/seo-audit.json
          reports/seo-audit.md
          reports/seo-scoreboard.md

    - name: Upload E2E Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: generator-e2e-reports
        path: |
          reports/e2e-report.json
          reports/e2e-report.md

    - name: Upload Production Build Assets
      uses: actions/upload-artifact@v4
      with:
        name: production-build-assets
        path: dist/
